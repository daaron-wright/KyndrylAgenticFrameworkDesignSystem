<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 48px; background: #fff; display: flex; align-items: center; justify-content: center; min-height: 220px; gap: 24px; }
  .badge { display: inline-flex; align-items: baseline; gap: 6px; padding: 5px 10px 5px 12px; border-radius: 999px; font-family: var(--font-sans); font-size: 12px; font-weight: 500; background: var(--k-ai-spruce-12); color: var(--k-spruce-80); border: 1px solid rgba(41,112,122,0.25); cursor: pointer; }
  .badge .v { font-family: var(--font-display); font-size: 14px; font-weight: 500; border-bottom: 1px dotted currentColor; }
  .badge .lbl { color: var(--k-spruce-70); font-size: 11px; }
  .badge .chev { width: 14px; height: 14px; display: inline-flex; align-items: center; justify-content: center; opacity: 0.6; font-size: 10px; }
  .ro { background: var(--bg-2); color: var(--fg-2); border-color: var(--border-1); cursor: default; }
  .ro .v { border-bottom: 0; }
  .ro .chev { display: none; }
  .lbl-readonly { display: none; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); }
  .low { background: var(--k-status-warning-10); color: var(--k-status-warning-110); border-color: var(--k-status-warning-20); }
  .low .lbl { color: var(--k-status-warning-110); }
</style>
</head>
<body>
<span id="badge" class="badge" tabindex="0" aria-haspopup="dialog">
  <span class="v" id="v">92%</span>
  <span class="lbl">confidence</span>
  <span class="chev">▾</span>
</span>
<span class="meta" id="meta">role: full</span>
<script>
  const p = new URLSearchParams(location.search);
  const value = Number(p.get("value") ?? 92);
  const role  = p.get("role") || "full";
  const b = document.getElementById("badge");
  document.getElementById("v").textContent = value + "%";
  document.getElementById("meta").textContent = "role: " + role;
  if (role === "readonly") b.classList.add("ro");
  if (value < 70) b.classList.add("low");
</script>
</body></html>
