<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 48px; background: #fff; display: flex; align-items: center; justify-content: center; gap: 18px; min-height: 200px; }
  .delta { display: inline-flex; align-items: center; gap: 4px; font-family: var(--font-display); font-size: 18px; font-weight: 500; }
  .delta.up { color: var(--k-status-success-110); }
  .delta.down { color: var(--k-status-error-110); }
  .delta .arrow { width: 14px; height: 14px; }
  .ref { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); margin-left: 4px; }
</style>
</head>
<body>
<span id="d" class="delta up">
  <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" id="arrow"><path d="M7 17 17 7"/><path d="M7 7h10v10"/></svg>
  <span id="v">+3.4%</span>
  <span class="ref">vs last week</span>
</span>
<script>
  const p = new URLSearchParams(location.search);
  const delta = Number(p.get("delta") ?? 3.4);
  const unit = p.get("unit") ?? "%";
  const dir  = p.get("direction") || (delta >= 0 ? "up" : "down");
  const sign = delta >= 0 ? "+" : "";
  document.getElementById("v").textContent = sign + delta + unit;
  document.getElementById("d").className = "delta " + dir;
  if (dir === "down") {
    document.getElementById("arrow").innerHTML = '<path d="M7 7l10 10"/><path d="M17 7v10H7"/>';
  }
</script>
</body></html>
