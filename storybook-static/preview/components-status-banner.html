<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:16px;background:#F2F4F5}
.card{max-width:660px;background:#fff;border:1px solid #E2E8F0;border-radius:8px;overflow:hidden}
.strip{padding:6px 14px;font-size:11px;font-weight:600;display:flex;gap:8px;align-items:center;border-bottom:1px solid}
.amber{background:#FEF3CF;color:#7A4800;border-color:#FCE38F}
.rose{background:#FDE7E2;color:#8A1E0D;border-color:#FBB8AB}
.emerald{background:#E0F2E8;color:#0D5C2E;border-color:#A8DDBF}
.body{padding:14px 16px;display:flex;gap:14px;align-items:center;justify-content:space-between}
.t{font-size:13px;font-weight:600;color:#141414;margin:0 0 2px}
.s{font-size:11px;color:var(--fg-muted);margin:0}
button{height:30px;padding:0 12px;border-radius:6px;font-size:12px;font-weight:500;background:#171717;color:#fff;border:none;cursor:pointer;display:inline-flex;gap:6px;align-items:center;flex-shrink:0}
svg{width:12px;height:12px}
</style></head><body>
<div class="card">
  <div class="strip amber"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 9v4M12 17h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>312 stale CIs detected overnight · High severity</div>
  <div class="body">
    <div><p class="t">Payments and Logistics domains below trust target</p><p class="s">Review recommended — 8 batch actions prepared</p></div>
    <button>Investigate with AI<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg></button>
  </div>
</div>
</body></html>
