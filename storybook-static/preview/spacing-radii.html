<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans)}
.hdr{font-family:var(--font-display);font-size:11px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:var(--fg-muted);margin:0 0 12px}
.row{display:flex;gap:16px;align-items:center;flex-wrap:wrap}
.s{display:flex;flex-direction:column;align-items:center;gap:8px}
.box{background:var(--k-spruce-10);border:1px solid var(--k-spruce-30);width:110px;height:70px;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:10px;color:var(--k-spruce-70)}
.lbl{font-size:10px;font-family:var(--font-mono);color:var(--fg-muted);text-align:center;line-height:1.4}
.lbl b{color:var(--fg-1);font-weight:500;display:block}
</style></head><body>
<div class="hdr">Shidoka radii — 2 / 4 / 8 / 16 · pill</div>
<div class="row">
  <div class="s"><div class="box" style="border-radius:2px">xs</div><span class="lbl"><b>2px</b>xs · dense table</span></div>
  <div class="s"><div class="box" style="border-radius:4px">sm</div><span class="lbl"><b>4px</b>button · input · chip</span></div>
  <div class="s"><div class="box" style="border-radius:8px">md</div><span class="lbl"><b>8px</b>card · default</span></div>
  <div class="s"><div class="box" style="border-radius:16px">lg</div><span class="lbl"><b>16px</b>dialog · drawer</span></div>
  <div class="s"><div class="box" style="border-radius:9999px">pill</div><span class="lbl"><b>full</b>badge · avatar · dot</span></div>
</div>
</body></html>
