<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:20px;background:#fff;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.b{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:9999px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;border:1px solid}
.conf{background:#EFF6FF;color:#1D4ED8;border-color:#BFDBFE}
.fresh{background:#F0FDF4;color:#047857;border-color:#BBF7D0;text-transform:none;letter-spacing:normal;font-weight:500;font-size:11px}
.stale{background:#FEF3C7;color:#B45309;border-color:#FDE68A;text-transform:none;letter-spacing:normal;font-weight:500;font-size:11px}
.src{background:#F1F5F9;color:#475569;border-color:#E2E8F0;text-transform:none;letter-spacing:normal;font-weight:500;font-size:11px;font-family:var(--font-mono)}
.role{background:#F5F3FF;color:#6D28D9;border-color:#DDD6FE}
svg{width:10px;height:10px}
</style></head><body>
<span class="b conf">92% Confidence</span>
<span class="b fresh"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Today</span>
<span class="b stale">Last verified 3d ago</span>
<span class="b fresh">12-week trend</span>
<span class="b src">source: ServiceNow</span>
<span class="b role">Approver-only</span>
</body></html>
