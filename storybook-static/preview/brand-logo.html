<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:16px;background:#fff;display:flex;gap:18px;align-items:center}
.logo{height:40px;width:auto}
.mark{display:flex;align-items:center;gap:12px;padding:12px 18px;border:1px solid #E2E8F0;border-radius:8px;background:#fff}
.dark{background:#29707A}.dark .lbl{color:rgba(255,255,255,.75)}
.lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:var(--fg-muted)}
.kyndryl-word{font-family:var(--font-sans);font-size:22px;font-weight:700;letter-spacing:-.01em;color:#141414}
.dark .kyndryl-word{color:#fff}
</style></head><body>
<div class="mark"><img class="logo" src="../assets/kyndryl-logo.png" alt="Kyndryl"></div>
<div class="mark dark"><img class="logo" src="../assets/kyndryl-logo.png" alt="Kyndryl" style="filter:brightness(0) invert(1)"></div>
<div style="display:flex;flex-direction:column;gap:4px;margin-left:8px">
  <span class="lbl">Primary · mono</span>
  <span style="font-family:var(--font-mono);font-size:11px;color:var(--fg-muted)">public/kyndryl-logo.png · 126px rendered width</span>
</div>
</body></html>
