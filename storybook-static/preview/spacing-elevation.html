<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:#F8FAFC;display:flex;gap:24px;align-items:center;flex-wrap:wrap}
.s{display:flex;flex-direction:column;align-items:center;gap:10px}
.box{background:#fff;width:130px;height:70px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:10px;color:var(--fg-muted)}
.lbl{font-size:10px;font-family:var(--font-mono);color:var(--fg-muted);text-align:center}
</style></head><body>
<div class="s"><div class="box" style="border:1px solid #E2E8F0">border only</div><span class="lbl">default card</span></div>
<div class="s"><div class="box" style="border:1px solid #E2E8F0;box-shadow:0 1px 2px rgba(15,23,42,.04)">sm</div><span class="lbl">shadow-sm</span></div>
<div class="s"><div class="box" style="border:1px solid #E2E8F0;box-shadow:0 1px 2px rgba(15,23,42,.04),0 1px 3px rgba(15,23,42,.03)">card</div><span class="lbl">shadow-card</span></div>
<div class="s"><div class="box" style="border:1px solid #E2E8F0;box-shadow:0 4px 16px rgba(15,23,42,.08),0 1px 2px rgba(15,23,42,.06)">pop</div><span class="lbl">popover · menu</span></div>
<div class="s"><div class="box" style="border:1px solid #E2E8F0;box-shadow:0 20px 48px rgba(15,23,42,.18)">drawer</div><span class="lbl">sheet · DAG panel</span></div>
</body></html>
