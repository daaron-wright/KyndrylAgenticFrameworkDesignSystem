<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:20px;background:#fff;display:flex;gap:12px;flex-wrap:wrap;align-items:center}
button{font-family:var(--font-sans);font-size:14px;font-weight:500;border-radius:6px;height:40px;padding:0 16px;display:inline-flex;align-items:center;gap:8px;cursor:pointer;border:none;transition:all 200ms cubic-bezier(.4,0,.2,1)}
.primary{background:#171717;color:#fff}
.primary:hover{background:rgba(23,23,23,.9)}
.outline{background:#fff;color:#171717;border:1px solid #E2E8F0}
.outline:hover{background:#F5F5F5}
.ghost{background:transparent;color:#334155}
.ghost:hover{background:#F1F5F9}
.destructive{background:#D62E2E;color:#fff}
.brand{background:#29707A;color:#fff}
.sm{height:32px;padding:0 12px;font-size:13px;border-radius:6px}
svg{width:14px;height:14px}
</style></head><body>
<button class="primary">Execute<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg></button>
<button class="outline">Send for review</button>
<button class="ghost">Dismiss</button>
<button class="brand">Investigate</button>
<button class="destructive">Reject</button>
<button class="outline sm">Filter</button>
<button class="primary sm"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>Ask AI</button>
</body></html>
