<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:16px;background:#fff;font-family:var(--font-sans)}
h4{font-family:var(--font-display);font-size:11px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:var(--fg-muted);margin:0 0 8px}
.grid{display:grid;grid-template-columns:repeat(10,1fr);gap:8px}
.sw{border-radius:4px;overflow:hidden;border:1px solid var(--border-1)}
.chip{height:56px}
.name{font-size:9px;color:var(--fg-muted);padding:4px 6px;font-family:var(--font-mono);text-align:center}
.hex{font-size:8px;color:var(--fg-muted);font-family:var(--font-mono);text-align:center;padding-bottom:4px}
</style></head><body>
<h4>Data-viz categorical — order-locked, Spruce primary + Warm Red secondary</h4>
<div class="grid">
  <div class="sw"><div class="chip" style="background:#29707A"></div><div class="name">cat-1</div><div class="hex">spruce-60</div></div>
  <div class="sw"><div class="chip" style="background:#FF462D"></div><div class="name">cat-2</div><div class="hex">warm-red-50</div></div>
  <div class="sw"><div class="chip" style="background:#3E8AC2"></div><div class="name">cat-3</div><div class="hex">blue-50</div></div>
  <div class="sw"><div class="chip" style="background:#8A4FBF"></div><div class="name">cat-4</div><div class="hex">violet</div></div>
  <div class="sw"><div class="chip" style="background:#E68A00"></div><div class="name">cat-5</div><div class="hex">amber</div></div>
  <div class="sw"><div class="chip" style="background:#5C6A73"></div><div class="name">cat-6</div><div class="hex">cool-gray</div></div>
  <div class="sw"><div class="chip" style="background:#5BA2AE"></div><div class="name">cat-7</div><div class="hex">spruce-40</div></div>
  <div class="sw"><div class="chip" style="background:#FF8766"></div><div class="name">cat-8</div><div class="hex">warm-red-30</div></div>
  <div class="sw"><div class="chip" style="background:#1F5580"></div><div class="name">cat-9</div><div class="hex">blue-70</div></div>
  <div class="sw"><div class="chip" style="background:#B82915"></div><div class="name">cat-10</div><div class="hex">warm-red-70</div></div>
</div>
</body></html>
