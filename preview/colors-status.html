<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:16px;background:#fff;display:grid;grid-template-columns:1fr 1fr;gap:24px;font-family:var(--font-sans)}
.title{font-family:var(--font-display);font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.14em;color:var(--fg-muted);margin-bottom:10px}
.row{display:flex;gap:10px;flex-wrap:wrap}
.chip{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:9999px;font-size:11px;font-weight:500;border:1px solid var(--border-1);background:#fff}
.dot{width:8px;height:8px;border-radius:50%}
</style></head><body>
<div class="group">
  <div class="title">Graph node · status</div>
  <div class="row">
    <span class="chip"><span class="dot" style="background:var(--status-healthy)"></span>Healthy</span>
    <span class="chip"><span class="dot" style="background:var(--status-degraded)"></span>Degraded</span>
    <span class="chip"><span class="dot" style="background:var(--status-impacted)"></span>Impacted</span>
    <span class="chip"><span class="dot" style="background:var(--status-unknown)"></span>Unknown</span>
  </div>
</div>
<div class="group">
  <div class="title">Workflow · lifecycle</div>
  <div class="row">
    <span class="chip"><span class="dot" style="background:var(--wf-pending)"></span>Pending</span>
    <span class="chip"><span class="dot" style="background:var(--wf-approved)"></span>Approved</span>
    <span class="chip"><span class="dot" style="background:var(--wf-executed)"></span>Executed</span>
    <span class="chip"><span class="dot" style="background:var(--wf-rejected)"></span>Rejected</span>
  </div>
</div>
</body></html>
