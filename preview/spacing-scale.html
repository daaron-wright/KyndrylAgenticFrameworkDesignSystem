<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:16px;background:#fff;font-family:var(--font-sans)}
.hdr{font-family:var(--font-display);font-size:11px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:var(--fg-muted);margin:0 0 12px}
.grid{display:flex;align-items:flex-end;gap:16px;flex-wrap:wrap}
.tok{display:flex;flex-direction:column;align-items:center;gap:6px}
.box{background:var(--k-spruce-10);border:1px solid var(--k-spruce-30);border-radius:2px}
.lbl{font-size:10px;color:var(--fg-muted);font-family:var(--font-mono);text-align:center;line-height:1.35}
.lbl b{color:var(--fg-1);display:block;font-weight:500}
</style></head><body>
<div class="hdr">Shidoka space tokens — space-set-quarter-x → space-set-3-x</div>
<div class="grid">
  <div class="tok"><div class="box" style="width:4px;height:4px"></div><span class="lbl"><b>quarter-x</b>4px</span></div>
  <div class="tok"><div class="box" style="width:8px;height:8px"></div><span class="lbl"><b>half-x</b>8px</span></div>
  <div class="tok"><div class="box" style="width:12px;height:12px"></div><span class="lbl"><b>¾-x</b>12px</span></div>
  <div class="tok"><div class="box" style="width:16px;height:16px"></div><span class="lbl"><b>1-x</b>16px</span></div>
  <div class="tok"><div class="box" style="width:24px;height:24px"></div><span class="lbl"><b>1½-x</b>24px</span></div>
  <div class="tok"><div class="box" style="width:32px;height:32px"></div><span class="lbl"><b>2-x</b>32px</span></div>
  <div class="tok"><div class="box" style="width:48px;height:48px"></div><span class="lbl"><b>3-x</b>48px</span></div>
  <div class="tok"><div class="box" style="width:64px;height:64px"></div><span class="lbl"><b>4-x</b>64px</span></div>
  <div class="tok"><div class="box" style="width:96px;height:96px"></div><span class="lbl"><b>6-x</b>96px</span></div>
</div>
</body></html>
