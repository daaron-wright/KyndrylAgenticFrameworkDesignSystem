<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:16px;background:#F2F4F5}
.card{max-width:660px;background:#fff;border:1px solid #E2E8F0;border-radius:8px;overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:12px}
thead{background:#F2F4F5}
th{text-align:left;padding:8px 12px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--fg-muted);border-bottom:1px solid #E2E8F0}
td{padding:10px 12px;border-bottom:1px solid #F1F5F9;color:#334155;vertical-align:middle}
tr:last-child td{border:none}
tr:hover td{background:#F2F4F5}
.mono{font-family:var(--font-mono);font-size:11px;color:#141414}
.pill{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:9999px;font-size:10px;font-weight:600;border:1px solid}
.crit{background:#FDE7E2;color:#8A1E0D;border-color:#FBB8AB}
.high{background:#FEF3CF;color:#7A4800;border-color:#FCE38F}
.link{color:#29707A;font-weight:500;text-decoration:none;font-size:11px}
</style></head><body>
<div class="card">
<table>
<thead><tr><th>Ticket</th><th>Subcategory</th><th>Priority</th><th>CIs</th><th></th></tr></thead>
<tbody>
<tr><td class="mono">bINC4219003</td><td>CMDB reconciliation drift</td><td><span class="pill crit">1- Immediate</span></td><td>47</td><td><a class="link">Investigate →</a></td></tr>
<tr><td class="mono">bINC4219040</td><td>Orphaned discovery record</td><td><span class="pill high">2- Urgent</span></td><td>12</td><td><a class="link">Investigate →</a></td></tr>
<tr><td class="mono">bINC4219118</td><td>Stale owner assignment</td><td><span class="pill high">3- High</span></td><td>8</td><td><a class="link">Investigate →</a></td></tr>
</tbody></table>
</div>
</body></html>
