<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:16px;background:#F2F4F5}
.card{background:#fff;border:1px solid #E2E8F0;border-radius:8px;padding:16px;max-width:640px}
.eyebrow{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:var(--fg-muted);margin-bottom:6px}
.head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
.head h3{margin:0;font-size:14px;font-weight:600}
.pct{font-size:28px;font-weight:700;color:#141414;letter-spacing:-.02em}
.target{font-size:11px;color:var(--fg-muted)}
.bar{position:relative;height:8px;background:#F1F5F9;border-radius:9999px;margin:10px 0 6px;overflow:visible}
.fill{position:absolute;inset:0;width:62%;background:linear-gradient(90deg,#29707A,#5BA2AE);border-radius:9999px}
.gap{position:absolute;top:0;left:62%;right:5%;height:100%;background:repeating-linear-gradient(45deg,#FCE38F,#FCE38F 4px,#FEF3CF 4px,#FEF3CF 8px);border-radius:0}
.marker{position:absolute;top:-4px;left:95%;width:2px;height:16px;background:#141414}
.marker::after{content:"Target 95%";position:absolute;top:-16px;left:-22px;font-size:9px;font-family:var(--font-mono);color:#141414;white-space:nowrap}
.legend{display:flex;justify-content:space-between;font-size:11px;color:var(--fg-muted);font-family:var(--font-mono)}
</style></head><body>
<div class="card">
  <div class="eyebrow">CMDB Trust Score</div>
  <div class="head"><h3>Current posture · reconciled CIs</h3><span class="target">Target 95% · gap 33 pts</span></div>
  <div class="pct">62<span style="font-size:16px;color:var(--fg-muted);font-weight:500">%</span></div>
  <div class="bar"><div class="fill"></div><div class="gap"></div><div class="marker"></div></div>
  <div class="legend"><span>0%</span><span>current 62%</span><span>target 95%</span></div>
</div>
</body></html>
