# Netlify deploy config — Kyndryl Agentic Framework Storybook
# Builds the real React/Vite Storybook and publishes the generated bundle.

[build]
  base    = "."
  command = "cd storybook && npm install && npm run build-storybook"
  publish = "storybook-build"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS    = "--no-audit --no-fund --legacy-peer-deps"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options       = "SAMEORIGIN"
    X-Content-Type-Options= "nosniff"
    Referrer-Policy       = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
