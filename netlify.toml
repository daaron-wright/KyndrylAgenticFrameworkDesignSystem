# Netlify deploy config — Kyndryl Agentic Framework Storybook
#
# DEFAULT: zero-build, publishes the static Storybook-style site.
# To switch to the real Vite-built Storybook instead, see the block at the bottom.

[build]
  base    = "."
  command = "echo 'Static site — no build step required'"
  publish = "storybook-static"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS    = "--no-audit --no-fund --legacy-peer-deps"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options       = "SAMEORIGIN"
    X-Content-Type-Options= "nosniff"
    Referrer-Policy       = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ───────────────────────────────────────────────────────────────────────────────
# To deploy the REAL Storybook 8 build instead, replace [build] above with:
#
# [build]
#   base    = "."
#   command = "cd storybook && npm install --legacy-peer-deps && npm run build-storybook"
#   publish = "storybook-build"
